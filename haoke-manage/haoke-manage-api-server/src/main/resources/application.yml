spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:30306/haoke?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    #    url: jdbc:mysql://mysql-service.default:3306/haoke?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  # flyway
  flyway:
    enabled: true # 开启Flyway（默认true）
    locations: classpath:db/migration # 迁移脚本的位置
    baseline-on-migrate: true # 非空库自动创建基线版本 在没有元数据表的情况下，针对非空Schema执行迁移时是否自动调用基线
    sql-migration-prefix: V
    sql-migration-suffixes: .sql
    clean-disabled: true # 生产环境必设true，禁止误删表
    validate-on-migrate: true # 迁移前校验脚本
    out-of-order: false # 禁止乱序执行脚本